---
# Minimum severity level to fail the commit (possible values: LOW, MEDIUM, HIGH, CRITICAL)
#
# Threshold rationale (Task 1.4, 2026-07-08): originally HIGH, with `severity_overrides`
# below promoting several checks *upward*. One override, `google-storage-enable-versioning:
# MEDIUM`, was dead twice over: (a) MEDIUM < HIGH so it could never fail the build even if it
# fired, and (b) `google-storage-enable-versioning` is not a real tfsec 1.28.6 check ID —
# tfsec's GCP storage ruleset has no bucket-versioning rule (verified empirically: a bucket
# resource with no `versioning` block at all produces zero versioning-related findings at
# any severity; tfsec silently ignores unknown IDs in `severity_overrides` the same way it
# would an unknown `--exclude` ID, so the entry was pure noise, not a control).
#
# Lowered the threshold to MEDIUM instead of just deleting the dead override: a full repo
# scan with this config (`tfsec . --config-file .tfsec.yml --exclude-path examples`)
# currently reports zero findings at MEDIUM or above, so there is no pre-existing MEDIUM
# noise to suppress — lowering the floor costs nothing today and raises the bar for new
# findings introduced later, which better matches a due-diligence-clean posture than
# leaving MEDIUM findings able to pass silently.
minimum_severity: MEDIUM

# Exclude specific directories from scanning
exclude:
  - "**/.terraform/**/*"  # Exclude terraform state directories
  - "**/examples/**/*"    # Exclude example directories

# Custom checks severity overrides for GCP
severity_overrides:
  google-compute-enable-os-login: HIGH
  google-compute-no-project-wide-ssh-keys: CRITICAL
  google-compute-enable-shielded-vm: HIGH
  google-sql-backup-configuration: CRITICAL
  google-storage-bucket-encryption: HIGH

# Exclude specific checks by code
#
# AWS coverage (Task K5, 2026-07-09): AWS checks are ENABLED in tfsec. This repo is a
# mixed GCP + AWS landing zone; the AWS modules must be scanned by both scanners, not
# only by checkov. Empirically, tfsec 1.28.6's AWS ruleset is thin, and at this config's
# MEDIUM severity floor a full AWS-enabled scan of both `modules/` and `envs/` reports
# ZERO findings (verified: only 2 module + 4 env findings exist at all, every one of them
# LOW severity — Lambda X-Ray tracing and informational unmanaged-key notes — which the
# MEDIUM floor already filters out). So enabling AWS delivers real, if modest, tfsec
# coverage with no suppressions required today. Deeper AWS controls (Lambda hardening,
# CloudTrail SNS, S3 multipart, cross-account trust) are covered by checkov via inline
# `# checkov:skip=` annotations in the affected modules; tfsec and checkov are therefore
# complementary here, not duplicated. AZU* stays excluded — there are no Azure resources.
exclude_checks:
  - AZU*  # Exclude all Azure checks — no Azure resources in this repo

# Provider check types: scan both GCP and AWS. (Previously restricted to `google`, which
# silently disabled all AWS rules; dropped as part of Task K5 so AWS modules are scanned.)
check_type:
  - google
  - aws

# Timeout settings (in seconds)
timeout: 300
