# Checkov configuration
# Each skipped check is documented with a justification.
# Checks are skipped here only when:
#   (a) the architectural pattern is intentional and verified, or
#   (b) Checkov cannot fully resolve the check for a known Terraform pattern.
#
# Inline # checkov:skip= annotations are used for resource-level skips.
# See modules/governance/kms, modules/cloud_storage, modules/stages/bootstrap.
#
# REMOVED from this file (no resources to trigger them):
#   CKV_GCP_46-50 — GKE checks: no google_container_* resources in this repo
#   CKV_GCP_27    — Cloud SQL public IP: no google_sql_* resources
#   CKV_GCP_78    — Compute public IP: no google_compute_instance resources
#   CKV_GCP_81    — Default SA on instances: no google_compute_instance resources
#   CKV_GCP_83    — Shielded VM: no google_compute_instance resources
#   CKV_GCP_84    — Disk public: no google_compute_disk resources
#
# REMOVED (already handled with inline skips at the resource level):
#   CKV_GCP_43  — KMS rotation: inline skip in modules/governance/kms/main.tf
#   CKV_GCP_45  — Security Admin role: inline skip in modules/stages/bootstrap/main.tf
#   CKV_GCP_62  — Log bucket self-logging: inline skips in 4 modules
#   CKV_GCP_125 — WIF provider constraints: inline skip in modules/iam/workload_identity/main.tf
#   CKV_TF_1    — Module version pinning: inline skip in modules/stages/workload/main.tf
#   CKV2_GCP_4  — Bucket lock: inline skip in modules/governance/cloud-audit-logs/main.tf

skip-check:
  # Service account user-managed keys: the bootstrap stage creates a Terraform
  # admin SA. Key management is handled via Workload Identity Federation (OIDC)
  # but Checkov flags the SA resource regardless of how credentials are obtained.
  - "CKV_GCP_1"

  # KMS key IAM bindings: Checkov flags service account bindings on KMS keys as
  # "publicly accessible" when cryptoKeyEncrypterDecrypter is granted to an SA.
  # These bindings are scoped to specific service accounts, not allUsers.
  - "CKV_GCP_16"

  # Service account admin privileges: the bootstrap service account intentionally
  # holds org-level admin roles (Organization Policy Admin, Security Admin,
  # IAM Security Admin) required to provision the landing zone. The equivalent
  # resource-level skip is in modules/stages/bootstrap/main.tf for CKV_GCP_45;
  # CKV_GCP_41 covers the broader SA admin check.
  - "CKV_GCP_41"

  # VPC flow logs on every subnet: the repo provides a dedicated
  # modules/network/vpc-flow-logs module that exports logs to GCS/BigQuery with
  # KMS encryption. Checkov checks for log_config on the subnet resource itself,
  # which is not how flow log export is implemented here (separate log sink pattern).
  - "CKV_GCP_73"

  # Cloud Audit Logs configuration: audit logging is configured via the
  # modules/governance/cloud-audit-logs module using google_organization_iam_audit_config
  # and google_logging_project_sink. Checkov checks for org-level audit config on
  # individual project resources which does not reflect this architecture.
  - "CKV2_GCP_5"

  # These checks relate to networking policies (VPC SC, peering configs) that
  # Checkov cannot fully resolve in modular Terraform with for_each. They are
  # kept here temporarily pending investigation; remove once root cause is confirmed.
  - "CKV_GCP_112"
  - "CKV_GCP_113"
  - "CKV_GCP_114"
  - "CKV_GCP_115"
  - "CKV_GCP_116"
  - "CKV_GCP_117"

  # Cloud DNS DNSSEC: DNS is configured via modules/network/dns. DNSSEC is enabled
  # by default in that module. Checkov may flag the resource before DNSSEC is
  # activated (two-step activation: create zone, then enable DNSSEC state).
  - "CKV2_GCP_18"
