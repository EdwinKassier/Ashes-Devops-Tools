# Checkov configuration
# Each skipped check is documented with a justification.
# Checks are skipped here only when:
#   (a) the architectural pattern is intentional and verified, or
#   (b) Checkov cannot fully resolve the check for a known Terraform pattern.
#
# Inline # checkov:skip= annotations are used for resource-level skips.
# See modules/governance/kms, modules/cloud-storage, modules/stages/bootstrap.
#
# AWS coverage (Task K5, 2026-07-09): checkov is the PRIMARY scanner for the AWS modules
# (tfsec 1.28.6's AWS ruleset is thin — see .tfsec.yml). All AWS-specific suppressions are
# resource-level inline `# checkov:skip=` annotations in the affected modules, NOT global
# entries, so each is scoped to the exact resource whose pattern is intentional:
#   modules/aws/incident-response/main.tf — CKV_AWS_50/115/116/117/272 (scaffold isolation
#     Lambda) and CKV_AWS_61 (forensics role trust scoped to one account + PrincipalOrgID)
#   modules/aws/cloudtrail-org/main.tf     — CKV_AWS_252 (central notification path, no per-trail SNS)
#   modules/aws/network-firewall, iam-role, edge-security, secrets-baseline,
#     stages/aws-workload — pre-existing inline AWS skips (see `grep -rn 'checkov:skip=CKV_AWS'`)
# CKV_AWS_300 (S3 abort-incomplete-multipart) was FIXED, not skipped: an
# abort_incomplete_multipart_upload lifecycle rule was added to modules/aws/log-archive-bucket.
# `checkov -d modules` and `checkov -d envs` are both green with these inline skips; no
# global AWS skip-check entry is required.
#
# REMOVED from this file (no resources to trigger them):
#   CKV_GCP_46-50 — GKE checks: no google_container_* resources in this repo
#   CKV_GCP_27    — Cloud SQL public IP: no google_sql_* resources
#   CKV_GCP_78    — Compute public IP: no google_compute_instance resources
#   CKV_GCP_81    — Default SA on instances: no google_compute_instance resources
#   CKV_GCP_83    — Shielded VM: no google_compute_instance resources
#   CKV_GCP_84    — Disk public: no google_compute_disk resources
#
# REMOVED (already handled with inline skips at the resource level):
#   CKV_GCP_43  — KMS rotation: inline skip in modules/governance/kms/main.tf
#   CKV_GCP_45  — Security Admin role: inline skip in modules/stages/bootstrap/main.tf
#   CKV_GCP_62  — Log bucket self-logging: inline skips in 4 modules
#   CKV_GCP_125 — WIF provider constraints: inline skip in modules/iam/workload-identity/main.tf
#   CKV_TF_1    — Module version pinning: inline skip in modules/stages/workload/main.tf
#   CKV2_GCP_4  — Bucket lock: inline skip in modules/governance/cloud-audit-logs/main.tf
#
# REMOVED (checks pass without skipping — verified by running Checkov across all modules):
#   CKV_GCP_112 — KMS public access: all KMS IAM bindings use specific SAs, not allUsers
#   CKV_GCP_113 — IAM policy public access: no google_iam_policy data sources with public members
#   CKV_GCP_114 — Storage public access prevention: all buckets set public_access_prevention="enforced"
#   CKV_GCP_115 — Basic roles at org level: iam/organization only grants predefined roles
#   CKV_GCP_116 — Basic roles at folder level: folder IAM only grants predefined roles
#   CKV_GCP_117 — Basic roles at project level: workload module validates and blocks basic roles
#
# REMOVED 2026-07-08 (audit of Task 1.9 — corrected mislabeled justifications, see
# `checkov --list | grep -E 'CKV_GCP_(1|16|41|73)'` for the authoritative check names):
#   CKV_GCP_1   — real check: "Ensure Stackdriver Logging is set to Enabled on Kubernetes
#                 Engine Clusters" (google_container_cluster). Old comment claimed it covered
#                 SA user-managed keys — wrong. This repo has no GKE clusters and no
#                 google_service_account_key resources, so the check never evaluates any
#                 resource here. Dead skip, safe to delete.
#   CKV_GCP_41  — real check: "Ensure that IAM users are not assigned the Service Account
#                 User or Service Account Token Creator roles at project level"
#                 (google_project_iam_binding/member). Old comment conflated it with the
#                 org-level admin-role check (that's CKV_GCP_45, already skipped inline in
#                 modules/stages/bootstrap/main.tf). Verified by running
#                 `checkov --check CKV_GCP_41` across modules/ and envs/: every
#                 google_project_iam_member in the repo (including the bootstrap Terraform
#                 Admin SA's project roles) already PASSES this check — no project-level
#                 grant of serviceAccountUser/serviceAccountTokenCreator exists. Dead skip,
#                 safe to delete; no inline skip needed since nothing fails.
# NOTE 2026-07-09 — CKV2_GCP_4 / CKV2_GCP_5 / CKV2_GCP_18 RESTORED as global skips (below).
# They were briefly removed on 2026-07-08 as "non-existent" because the LOCAL checkov
# (3.2.490) did not surface them, but CI runs the checkov-action image (3.2.527), where all
# three exist and fire. Local `make security` therefore did not reproduce the CI result
# (a version-skew gap — see the version note at the bottom of this file). The skips are
# architecturally justified (rationale on each entry) and are restored so the CI Checkov
# gate matches the repo's intended posture. A skip for a check ID absent from a given
# checkov version is a harmless no-op, so these are safe across both versions.
#
# CKV_GCP_16 was also removed from the global skip list: the real check is "Ensure that
# DNSSEC is enabled for Cloud DNS" (google_dns_managed_zone), not "KMS key IAM bindings
# publicly accessible" as the old comment claimed. Verified with
# `checkov --check CKV_GCP_16` against modules/ and envs/: both google_dns_managed_zone
# resources (modules/network/dns) already PASS — DNSSEC is enabled by default in that
# module — so no skip is needed at all, global or inline.

skip-check:
  # Log4Shell (CVE-2021-44228) canary rule: CKV_GCP_73 ("Ensure Cloud Armor prevents
  # message lookup in Log4j2") only recognizes the literal expression
  # evaluatePreconfiguredExpr('cve-canary') / evaluatePreconfiguredWaf('cve-canary').
  # modules/network/cloud-armor/main.tf implements the same protection via GCP's current
  # named preconfigured WAF rule set, evaluatePreconfiguredWaf('log4j-v33-stable', ...),
  # attached as a separate google_compute_security_policy_rule (see
  # google_compute_security_policy_rule.log4j_protection, enabled by default via
  # var.enable_log4j_protection = true). Checkov's hardcoded expression string predates
  # GCP's named preconfigured rule sets and cannot recognize this pattern, so the check
  # FAILS on every google_compute_security_policy in the repo even though Log4Shell
  # protection is genuinely enabled by default. Kept as a global skip (not scoped inline)
  # because every google_compute_security_policy in the repo goes through this same
  # module and hits the same false positive — there is no instance where an inline,
  # per-resource skip would be more precise.
  - "CKV_GCP_73"

  # CKV2_GCP_18 "Ensure GCP network defines a firewall and does not use the default firewall":
  # a cross-resource graph check that wants a firewall associated with each
  # google_compute_network. This repo defines firewall rules in DEDICATED modules
  # (modules/network/network-firewall, modules/network/hierarchical-firewall, and the host
  # module's rules), never inline in the vpc module, so checkov's graph cannot link them to
  # the network and reports a false positive on every google_compute_network.vpc. Firewalls
  # ARE defined; the association is just cross-module. Global skip (every VPC is created via
  # the same vpc module and hits the same false positive).
  - "CKV2_GCP_18"

  # CKV2_GCP_5 "Ensure Cloud Audit Logging is configured properly across all services and
  # users from a project": wants a per-project google_project_iam_audit_config. This landing
  # zone configures audit logging ONCE at the org level via google_organization_iam_audit_config
  # (modules/governance/cloud-audit-logs), which applies to every project beneath the org —
  # per-project audit config is intentionally not used (it would be redundant and drift-prone).
  # The check fires on google_project resources that are correctly covered org-wide.
  - "CKV2_GCP_5"

  # CKV2_GCP_4 "Ensure retention policies on log buckets are configured using Bucket Lock":
  # wants immutable (WORM) Bucket Lock retention on log sink destinations. This is an explicit,
  # documented operational trade-off for this project: Bucket Lock makes objects undeletable
  # until the retention period elapses, which is too rigid for the current environment. Log
  # durability is instead provided by the org-level audit sink plus lifecycle age-based
  # retention. Revisit if a compliance regime later mandates WORM audit-log retention.
  - "CKV2_GCP_4"

