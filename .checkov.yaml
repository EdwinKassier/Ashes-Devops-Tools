skip-check:
  # Log4Shell (CVE-2021-44228) canary rule: CKV_GCP_73 ("Ensure Cloud Armor prevents
  # message lookup in Log4j2") only recognizes the literal expression
  # evaluatePreconfiguredExpr('cve-canary') / evaluatePreconfiguredWaf('cve-canary').
  # modules/network/cloud-armor/main.tf implements the same protection via GCP's current
  # named preconfigured WAF rule set, evaluatePreconfiguredWaf('log4j-v33-stable', ...),
  # attached as a separate google_compute_security_policy_rule (see
  # google_compute_security_policy_rule.log4j_protection, enabled by default via
  # var.enable_log4j_protection = true). Checkov's hardcoded expression string predates
  # GCP's named preconfigured rule sets and cannot recognize this pattern, so the check
  # FAILS on every google_compute_security_policy in the repo even though Log4Shell
  # protection is genuinely enabled by default. Kept as a global skip (not scoped inline)
  # because every google_compute_security_policy in the repo goes through this same
  # module and hits the same false positive — there is no instance where an inline,
  # per-resource skip would be more precise.
  - "CKV_GCP_73"
