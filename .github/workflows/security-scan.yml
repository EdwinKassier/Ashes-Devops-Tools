name: Security Scan

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.tfsec.yml'
      - '.github/workflows/security-scan.yml'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  # Scheduled scans get their own concurrency group so a push to main never
  # cancels a running nightly scan (which would leave SARIF results unpublished).
  # Push/PR runs within the same ref still cancel each other to save runners.
  group: security-scan-${{ github.event_name == 'schedule' && 'scheduled' || github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  static-analysis:
    name: TFSec + Checkov
    uses: ./.github/workflows/reusable-security.yml
    with:
      sarif_output: true

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Run Trivy scanner
        # Scope decision: Trivy intentionally scans the whole repo, including
        # `examples/` and `modules/*/examples/*`. tfsec excludes examples via
        # `--exclude-path examples` (see Makefile) because example roots are
        # deliberately minimal/illustrative and would otherwise generate noisy
        # tfsec findings; Checkov has no example skip-path and already scans
        # them. Examples are real Terraform that gets `terraform init`/`validate`/
        # tested in CI, so holding them to Trivy's CRITICAL/HIGH bar is intentional
        # defense-in-depth rather than an oversight.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-dirs: '.terraform'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [static-analysis, trivy, secret-scan]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TFSec + Checkov | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SECURITY_TAB="https://github.com/${{ github.repository }}/security/code-scanning"
          echo "View detailed results in the [Security tab](${SECURITY_TAB})" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        if: >-
          needs.static-analysis.result == 'failure' ||
          needs.trivy.result == 'failure' ||
          needs.secret-scan.result == 'failure'
        run: |
          failed=""
          [ "${{ needs.static-analysis.result }}" = "failure" ] && failed="${failed} TFSec+Checkov"
          [ "${{ needs.trivy.result }}" = "failure" ]           && failed="${failed} Trivy"
          [ "${{ needs.secret-scan.result }}" = "failure" ]     && failed="${failed} GitLeaks"
          echo "::error::Security scan(s) failed:${failed}. Check the Security tab for details."
          exit 1
