name: Terraform Validation

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.hcl"
      - ".tfsec.yml"
      - ".terraform-docs.yml"
      - ".tflint.hcl"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/documentation.yml"
      - "scripts/terraform-roots.sh"
      - "scripts/module-docs.sh"
      - "Makefile"

permissions:
  contents: read

env:
  TERRAFORM_VERSION: "1.6.6"

jobs:
  discover:
    name: Discover Terraform Roots
    runs-on: ubuntu-latest
    outputs:
      roots: ${{ steps.roots.outputs.roots }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover roots
        id: roots
        run: echo "roots=$(./scripts/terraform-roots.sh all-json)" >> "$GITHUB_OUTPUT"

  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check formatting
        run: terraform fmt -recursive -check .

  docs:
    name: Terraform Docs Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup terraform-docs
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: modules/host
          output-method: print

      - name: Assert docs are committed
        run: make docs-check

  validate:
    name: Validate ${{ matrix.root }}
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        root: ${{ fromJson(needs.discover.outputs.roots) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ matrix.root }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ matrix.root }}
        run: terraform validate

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: make lint

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec against modules
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: modules
          soft_fail: false
          config_file: .tfsec.yml

      - name: Run tfsec against envs
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: envs
          soft_fail: false
          config_file: .tfsec.yml

      - name: Run Checkov against modules
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Run Checkov against envs
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: envs
          framework: terraform
          quiet: true
          soft_fail: false

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [fmt, docs, validate, lint, security]
    if: always()
    steps:
      - name: Publish summary
        run: |
          echo "## Terraform Validation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format | ${{ needs.fmt.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docs | ${{ needs.docs.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TFLint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security | ${{ needs.security.result }} |" >> "$GITHUB_STEP_SUMMARY"
