name: Terraform Validation

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**.tf"
      - "**.tftest.hcl"
      - "**.tfvars"
      - "**.hcl"
      - ".tfsec.yml"
      - ".checkov.yaml"
      - ".terraform-docs.yml"
      - ".tflint.hcl"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/documentation.yml"
      - ".github/workflows/reusable-security.yml"
      - "scripts/terraform-roots.sh"
      - "scripts/module-docs.sh"
      - "Makefile"

permissions:
  contents: read
  # Required: the security job calls reusable-security.yml with sarif_output: true.
  # GitHub bounds reusable workflow token permissions to the caller's permissions,
  # so without this grant all SARIF uploads would receive a 403.
  security-events: write

concurrency:
  group: terraform-plan-${{ github.ref_name }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.9.8"

jobs:
  discover:
    name: Discover Terraform Roots
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      roots: ${{ steps.roots.outputs.roots }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Discover roots
        id: roots
        run: echo "roots=$(./scripts/terraform-roots.sh all-json)" >> "$GITHUB_OUTPUT"

  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check formatting
        run: terraform fmt -recursive -check .

  docs:
    name: Terraform Docs Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install terraform-docs
        run: |
          TDOCS_VERSION=0.19.0
          BASE_URL="https://github.com/terraform-docs/terraform-docs/releases/download/v${TDOCS_VERSION}"
          TARBALL="terraform-docs-v${TDOCS_VERSION}-linux-amd64.tar.gz"
          CHECKSUM_FILE="terraform-docs-v${TDOCS_VERSION}.sha256sum"

          # Download tarball and checksum file side-by-side
          curl -sSLO "${BASE_URL}/${TARBALL}"
          curl -sSLO "${BASE_URL}/${CHECKSUM_FILE}"

          # Verify integrity before extracting
          sha256sum --check --ignore-missing "${CHECKSUM_FILE}"

          # Extract only the terraform-docs binary
          tar -xz -C /usr/local/bin terraform-docs < "${TARBALL}"
          terraform-docs --version

          # Cleanup
          rm -f "${TARBALL}" "${CHECKSUM_FILE}"

      - name: Assert docs are committed
        run: make docs-check

  validate:
    name: Validate ${{ matrix.root }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: discover
    strategy:
      fail-fast: false  # Show ALL root failures in one run rather than cancelling siblings
      matrix:
        root: ${{ fromJson(needs.discover.outputs.roots) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ matrix.root }}
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: ${{ matrix.root }}
        run: |
          if grep -rqE 'configuration_aliases' . --include='*.tf'; then
            echo "Skipping standalone validate: module declares" \
              "configuration_aliases (cannot be root-validated without a" \
              "passed provider; covered by its examples/, the composing" \
              "stage/root, and mock_provider tests)."
          else
            terraform validate
          fi

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    # 30 (not 15): `make lint` runs `terraform init` across every root serially;
    # with the AWS landing zone (~35 extra modules/roots) the provider fetches
    # push a cold run past 15m. The plugin cache below keeps it well under 30m.
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93  # v6.2.2
        with:
          tflint_version: "v0.62.0"

      # Download each provider once and reuse it across all roots' inits,
      # instead of re-fetching the ~500MB AWS provider per root. Set via
      # $GITHUB_ENV (not job-level env, where the runner context is unavailable).
      - name: Prepare provider plugin cache
        run: |
          echo "TF_PLUGIN_CACHE_DIR=${RUNNER_TEMP}/tf-plugin-cache" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/tf-plugin-cache"

      - name: Run TFLint
        run: make lint

  meta-lint:
    name: Meta Lint (yaml/markdown/commits)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c  # v6.0.0
        with:
          python-version: "3.12"

      # pre-commit's `run` subcommand only accepts a single hook id at a time,
      # so yamllint and markdownlint are invoked as separate steps rather than
      # a single `extra_args: yamllint markdownlint`.
      - name: Run yamllint (pre-commit)
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
        with:
          extra_args: yamllint --all-files

      - name: Run markdownlint (pre-commit)
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1
        with:
          extra_args: markdownlint --all-files

      - name: Check conventional commit messages
        # commitizen's pre-commit hook is stage-restricted to `commit-msg` and
        # validates a single message, so it cannot run via `pre-commit run
        # commitizen --all-files`. `cz check --rev-range` is commitizen's own
        # CI entry point for validating every commit introduced by a PR.
        run: |
          python -m pip install commitizen==4.16.4
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Full fetch (not --depth=1) so the merge-base is resolvable, then
            # anchor the range on it. A plain origin/<base>..HEAD range includes
            # commits already merged into the base (e.g. when the base advanced
            # via a merge commit), dragging in pre-linting history and failing
            # the check spuriously. merge-base..HEAD is exactly this PR's commits.
            git fetch --no-tags origin "${{ github.base_ref }}"
            base_sha="$(git merge-base "origin/${{ github.base_ref }}" HEAD)"
            cz check --rev-range "${base_sha}..HEAD"
          else
            cz check --rev-range "HEAD~1..HEAD"
          fi

  security:
    name: Security
    uses: ./.github/workflows/reusable-security.yml
    with:
      sarif_output: true

  test:
    name: Terraform Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Run terraform test suites
        run: make test

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [fmt, docs, validate, lint, meta-lint, security, test]
    if: always()
    steps:
      - name: Publish summary
        run: |
          echo "## Terraform Validation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Format | ${{ needs.fmt.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Docs | ${{ needs.docs.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate | ${{ needs.validate.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TFLint | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Meta Lint | ${{ needs.meta-lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security | ${{ needs.security.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
