name: Drift Detection

# Required repository configuration (see docs/guides/CI_SECRETS.md):
#   - secrets.TFC_TOKEN        Terraform Cloud API token (Team or Organization token
#                              with read access to the target workspaces).
#   - vars.TFC_ORGANIZATION    Terraform Cloud organization name.
#   - vars.TFC_DRIFT_WORKSPACES  (optional) JSON array of workspace names to check.
#                              Defaults to '["organization","apps-dev"]' when unset.
# When TFC_TOKEN/TFC_ORGANIZATION are not configured, the scheduled run SKIPS
# cleanly (via the check-credentials gate below) instead of failing red — a
# missing-secret condition is a configuration gap, not a CI failure.
# workflow_dispatch always runs the credential assertion step so a manual
# invocation still fails loudly if secrets are missing.

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Weekdays at 08:00 UTC
  workflow_dispatch:
    inputs:
      workspaces:
        description: >
          Comma-separated list of TFC workspace names to check for drift.
          Defaults to the standard set when left blank.
          Example: organization,apps-dev,apps-prod
        required: false
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: drift-detection
  cancel-in-progress: false

jobs:
  check-credentials:
    name: Check Terraform Cloud credentials
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check whether TFC_TOKEN / TFC_ORGANIZATION are configured
        id: check
        # `secrets.*` cannot be referenced directly in a job-level `if:`, so we
        # evaluate it here (where secrets ARE available) and expose a plain
        # job output that downstream `if:` conditions can safely read.
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
        run: |
          if [ -n "$TFC_TOKEN" ] && [ -n "$TFC_ORGANIZATION" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::TFC_TOKEN (secret) and/or TFC_ORGANIZATION (variable)" \
                "are not configured. Manual runs require both — see docs/guides/CI_SECRETS.md."
              exit 1
            fi
            echo "::warning::TFC_TOKEN (secret) and/or TFC_ORGANIZATION (variable)" \
              "are not configured. Skipping scheduled drift detection cleanly." \
              "See docs/guides/CI_SECRETS.md for setup."
          fi

  detect-drift:
    name: Detect Drift (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-credentials
    if: needs.check-credentials.outputs.configured == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Default workspace set: the org control plane plus common app environments.
        # Override at runtime via workflow_dispatch → workspaces input.
        # NOTE: The "apps" workspace does NOT exist in TFC — actual workspace names follow
        # the "apps-<env>" convention (apps-dev, apps-staging, apps-prod). Adjust this list
        # to match your TFC workspace names. Using a repository variable (TFC_WORKSPACES)
        # is recommended for environments with many app workspaces.
        # Default workspace set — adjust to match your TFC workspace names.
        # The "apps" workspace does NOT exist; real app workspace names are "apps-<env>"
        # (e.g., apps-dev, apps-staging, apps-prod). Override at runtime using the
        # workflow_dispatch input above, or set the TFC_DRIFT_WORKSPACES repository
        # variable to a JSON array: '["organization","apps-dev","apps-prod"]'
        #
        # RECOMMENDED TFC_DRIFT_WORKSPACES value for the full GCP + AWS landing zone.
        # Set this repository variable to a JSON array covering every foundational and
        # workload workspace you want monitored (substitute real <env>/<name> values):
        #   [
        #     "organization",           # GCP control plane
        #     "apps-dev",               # GCP app envs (add apps-staging, apps-prod, ...)
        #     "aws-organization",       # AWS Organizations / SCPs / cost governance
        #     "aws-security",           # GuardDuty, Security Hub, Config, CloudTrail
        #     "aws-network",            # Transit Gateway, IPAM, Network Firewall
        #     "aws-identity",           # IAM Identity Center
        #     "aws-shared-services",    # Log archive, KMS, private CA, SSM
        #     "aws-backup",             # Org-wide AWS Backup
        #     "aws-workload-dev",       # AWS per-env workloads (aws-workload-<env>)
        #     "saas-web"                # SaaS workspaces (saas-<name>)
        #   ]
        # The inline default below stays GCP-only so an unset variable never fails
        # against AWS/saas workspaces that may not exist yet — set the variable to opt in.
        workspace: ${{ fromJSON(vars.TFC_DRIFT_WORKSPACES || '["organization","apps-dev"]') }}
    steps:
      - name: Assert Terraform Cloud credentials are configured
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
        run: |
          test -n "$TFC_TOKEN"
          test -n "$TFC_ORGANIZATION"

      - name: Fetch latest run status from Terraform Cloud
        id: run_status
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          RUNS_URL="https://app.terraform.io/api/v2/organizations/${TFC_ORGANIZATION}"
          RUNS_URL="${RUNS_URL}/workspaces/${WORKSPACE}/runs?page%5Bsize%5D=1"
          response=$(curl --silent --show-error --fail-with-body \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "${RUNS_URL}") \
            || { echo "::error::TFC API request failed for workspace '${WORKSPACE}'." \
              "Check TFC_TOKEN and TFC_ORGANIZATION. Response: ${response}" >&2; exit 1; }

          if ! echo "$response" | jq -e '.data | type == "array"' >/dev/null 2>&1; then
            echo "::error::Unexpected TFC API response format for workspace '${WORKSPACE}': ${response}" >&2
            exit 1
          fi

          status=$(echo "$response" | jq -r '.data[0].attributes.status // "none"')
          run_id=$(echo "$response" | jq -r '.data[0].id // "none"')
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Trigger speculative plan via Terraform Cloud API
        id: trigger_plan
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          # Look up workspace ID and validate it exists
          WS_URL="https://app.terraform.io/api/v2/organizations/${TFC_ORGANIZATION}"
          WS_URL="${WS_URL}/workspaces/${WORKSPACE}"
          ws_response=$(curl --silent --show-error --fail-with-body \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "${WS_URL}") \
            || { echo "::error::Workspace '${WORKSPACE}' not found in TFC org" \
              "'${TFC_ORGANIZATION}'. Verify the workspace exists. Response: ${ws_response}" >&2; exit 1; }
          ws_id=$(echo "$ws_response" | jq -r '.data.id')
          if [ -z "$ws_id" ] || [ "$ws_id" = "null" ]; then
            echo "::error::Could not parse workspace ID from TFC response for '${WORKSPACE}'" >&2
            exit 1
          fi
          echo "workspace_id=${ws_id}" >> "$GITHUB_OUTPUT"

          # Trigger a speculative plan (drift check) using the latest configuration version
          run_response=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --data "{
              \"data\": {
                \"attributes\": {
                  \"message\": \"Drift detection run (automated)\",
                  \"plan-only\": true,
                  \"refresh\": true
                },
                \"type\": \"runs\",
                \"relationships\": {
                  \"workspace\": {
                    \"data\": { \"type\": \"workspaces\", \"id\": \"${ws_id}\" }
                  }
                }
              }
            }" \
            "https://app.terraform.io/api/v2/runs")
          drift_run_id=$(echo "$run_response" | jq -r '.data.id')
          echo "drift_run_id=${drift_run_id}" >> "$GITHUB_OUTPUT"

      - name: Poll for plan result
        id: poll
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          DRIFT_RUN_ID: ${{ steps.trigger_plan.outputs.drift_run_id }}
        run: |
          for i in $(seq 1 20); do
            sleep 30
            run_response=$(curl --silent --show-error \
              --header "Authorization: Bearer ${TFC_TOKEN}" \
              --header "Content-Type: application/vnd.api+json" \
              "https://app.terraform.io/api/v2/runs/${DRIFT_RUN_ID}")
            status=$(echo "$run_response" | jq -r '.data.attributes.status')
            resource_additions=$(echo "$run_response" | jq -r '.data.attributes["resource-additions"] // 0')
            resource_changes=$(echo "$run_response" | jq -r '.data.attributes["resource-changes"] // 0')
            resource_destructions=$(echo "$run_response" | jq -r '.data.attributes["resource-destructions"] // 0')
            echo "Attempt ${i}: status=${status} +${resource_additions} ~${resource_changes} -${resource_destructions}"
            case "$status" in
              planned_and_finished|planned)
                total=$((resource_additions + resource_changes + resource_destructions))
                echo "drift_detected=$([ "$total" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
                echo "resource_additions=${resource_additions}" >> "$GITHUB_OUTPUT"
                echo "resource_changes=${resource_changes}" >> "$GITHUB_OUTPUT"
                echo "resource_destructions=${resource_destructions}" >> "$GITHUB_OUTPUT"
                RUN_URL="https://app.terraform.io/app/${TFC_ORGANIZATION}"
                RUN_URL="${RUN_URL}/workspaces/${{ matrix.workspace }}/runs/${DRIFT_RUN_ID}"
                echo "run_url=${RUN_URL}" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              errored|canceled|discarded)
                echo "Plan run ended with status: ${status}" >&2
                exit 1
                ;;
            esac
          done
          echo "Timed out waiting for plan to complete" >&2
          exit 1

      - name: Open drift issue
        if: steps.poll.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          TITLE="[Drift] Infrastructure drift detected in workspace: ${WORKSPACE}"
          BODY="## Infrastructure Drift Detected

          Workspace **\`${WORKSPACE}\`** has drifted from the Terraform state.

          | Metric | Count |
          |--------|-------|
          | Additions | ${{ steps.poll.outputs.resource_additions }} |
          | Changes | ${{ steps.poll.outputs.resource_changes }} |
          | Destructions | ${{ steps.poll.outputs.resource_destructions }} |

          **Plan URL:** ${{ steps.poll.outputs.run_url }}

          Review and apply the changes to bring the workspace back into compliance.
          "

          # Check if an open drift issue already exists to avoid duplicates
          existing=$(gh issue list \
            --label "drift" \
            --state open \
            --search "\"[Drift]\" in:title workspace: ${WORKSPACE}" \
            --json number \
            --jq '.[0].number')

          if [ -z "$existing" ]; then
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "drift"
          else
            echo "Drift issue #${existing} already open for ${WORKSPACE}, skipping creation."
          fi

  summary:
    name: Drift Detection Summary
    runs-on: ubuntu-latest
    needs: [check-credentials, detect-drift]
    if: always()
    steps:
      - name: Publish summary
        # needs.detect-drift.result is the aggregated matrix result:
        #   success  = ALL workspace jobs passed (no drift detected in any workspace)
        #   failure  = ONE or more workspace jobs failed (drift or API error)
        #   skipped  = check-credentials reported TFC_TOKEN/TFC_ORGANIZATION are not configured
        # Individual per-workspace results appear as annotations on each matrix job.
        env:
          CONFIGURED: ${{ needs.check-credentials.outputs.configured }}
          RESULT: ${{ needs.detect-drift.result }}
          WORKSPACES: ${{ vars.TFC_DRIFT_WORKSPACES || '["organization","apps-dev"]' }}
        run: |
          {
            echo "## Drift Detection Summary"
            echo ""
            if [ "$CONFIGURED" != "true" ]; then
              echo "⏭️ **Skipped — Terraform Cloud credentials are not configured.**"
              echo ""
              echo "Set the \`TFC_TOKEN\` repository secret and \`TFC_ORGANIZATION\` repository"
              echo "variable to enable scheduled drift detection. See docs/guides/CI_SECRETS.md."
            elif [ "$RESULT" = "success" ]; then
              echo "✅ **All workspace plans completed — no drift detected.**"
            else
              echo "❌ **One or more workspace plans detected drift or encountered an error.**"
              echo ""
              echo "Check the individual matrix job steps above for Terraform Cloud run links and"
              echo "per-workspace change counts, or look for automatically opened GitHub Issues"
              echo "labelled \`drift\`."
            fi
            echo ""
            echo "**Configured workspaces** (\`TFC_DRIFT_WORKSPACES\` repository variable): \`${WORKSPACES}\`"
            echo ""
            echo "To override at runtime, use the workflow_dispatch input."
          } >> "$GITHUB_STEP_SUMMARY"
