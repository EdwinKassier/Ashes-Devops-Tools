name: Drift Detection

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Weekdays at 08:00 UTC
  workflow_dispatch:
    inputs:
      workspaces:
        description: >
          Comma-separated list of TFC workspace names to check for drift.
          Defaults to the standard set when left blank.
          Example: organization,apps-dev,apps-prod
        required: false
        default: ""

permissions:
  contents: read
  issues: write

concurrency:
  group: drift-detection
  cancel-in-progress: false

jobs:
  detect-drift:
    name: Detect Drift (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Default workspace set: the org control plane plus common app environments.
        # Override at runtime via workflow_dispatch → workspaces input.
        # NOTE: The "apps" workspace does NOT exist in TFC — actual workspace names follow
        # the "apps-<env>" convention (apps-dev, apps-staging, apps-prod). Adjust this list
        # to match your TFC workspace names. Using a repository variable (TFC_WORKSPACES)
        # is recommended for environments with many app workspaces.
        # Default workspace set — adjust to match your TFC workspace names.
        # The "apps" workspace does NOT exist; real app workspace names are "apps-<env>"
        # (e.g., apps-dev, apps-staging, apps-prod). Override at runtime using the
        # workflow_dispatch input above, or set the TFC_DRIFT_WORKSPACES repository
        # variable to a JSON array: '["organization","apps-dev","apps-prod"]'
        workspace: ${{ fromJSON(vars.TFC_DRIFT_WORKSPACES || '["organization","apps-dev"]') }}
    steps:
      - name: Assert Terraform Cloud credentials are configured
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
        run: |
          test -n "$TFC_TOKEN"
          test -n "$TFC_ORGANIZATION"

      - name: Fetch latest run status from Terraform Cloud
        id: run_status
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          response=$(curl --silent --show-error --fail-with-body \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${TFC_ORGANIZATION}/workspaces/${WORKSPACE}/runs?page%5Bsize%5D=1") \
            || { echo "::error::TFC API request failed for workspace '${WORKSPACE}'. Check TFC_TOKEN and TFC_ORGANIZATION. Response: ${response}" >&2; exit 1; }

          if ! echo "$response" | jq -e '.data | type == "array"' >/dev/null 2>&1; then
            echo "::error::Unexpected TFC API response format for workspace '${WORKSPACE}': ${response}" >&2
            exit 1
          fi

          status=$(echo "$response" | jq -r '.data[0].attributes.status // "none"')
          run_id=$(echo "$response" | jq -r '.data[0].id // "none"')
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"

      - name: Trigger speculative plan via Terraform Cloud API
        id: trigger_plan
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          # Look up workspace ID and validate it exists
          ws_response=$(curl --silent --show-error --fail-with-body \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${TFC_ORGANIZATION}/workspaces/${WORKSPACE}") \
            || { echo "::error::Workspace '${WORKSPACE}' not found in TFC org '${TFC_ORGANIZATION}'. Verify the workspace exists. Response: ${ws_response}" >&2; exit 1; }
          ws_id=$(echo "$ws_response" | jq -r '.data.id')
          if [ -z "$ws_id" ] || [ "$ws_id" = "null" ]; then
            echo "::error::Could not parse workspace ID from TFC response for '${WORKSPACE}'" >&2
            exit 1
          fi
          echo "workspace_id=${ws_id}" >> "$GITHUB_OUTPUT"

          # Trigger a speculative plan (drift check) using the latest configuration version
          run_response=$(curl --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            --data "{
              \"data\": {
                \"attributes\": {
                  \"message\": \"Drift detection run (automated)\",
                  \"plan-only\": true,
                  \"refresh\": true
                },
                \"type\": \"runs\",
                \"relationships\": {
                  \"workspace\": {
                    \"data\": { \"type\": \"workspaces\", \"id\": \"${ws_id}\" }
                  }
                }
              }
            }" \
            "https://app.terraform.io/api/v2/runs")
          drift_run_id=$(echo "$run_response" | jq -r '.data.id')
          echo "drift_run_id=${drift_run_id}" >> "$GITHUB_OUTPUT"

      - name: Poll for plan result
        id: poll
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          DRIFT_RUN_ID: ${{ steps.trigger_plan.outputs.drift_run_id }}
        run: |
          for i in $(seq 1 20); do
            sleep 30
            run_response=$(curl --silent --show-error \
              --header "Authorization: Bearer ${TFC_TOKEN}" \
              --header "Content-Type: application/vnd.api+json" \
              "https://app.terraform.io/api/v2/runs/${DRIFT_RUN_ID}")
            status=$(echo "$run_response" | jq -r '.data.attributes.status')
            resource_additions=$(echo "$run_response" | jq -r '.data.attributes["resource-additions"] // 0')
            resource_changes=$(echo "$run_response" | jq -r '.data.attributes["resource-changes"] // 0')
            resource_destructions=$(echo "$run_response" | jq -r '.data.attributes["resource-destructions"] // 0')
            echo "Attempt ${i}: status=${status} +${resource_additions} ~${resource_changes} -${resource_destructions}"
            case "$status" in
              planned_and_finished|planned)
                total=$((resource_additions + resource_changes + resource_destructions))
                echo "drift_detected=$([ "$total" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
                echo "resource_additions=${resource_additions}" >> "$GITHUB_OUTPUT"
                echo "resource_changes=${resource_changes}" >> "$GITHUB_OUTPUT"
                echo "resource_destructions=${resource_destructions}" >> "$GITHUB_OUTPUT"
                echo "run_url=https://app.terraform.io/app/${TFC_ORGANIZATION}/workspaces/${{ matrix.workspace }}/runs/${DRIFT_RUN_ID}" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              errored|canceled|discarded)
                echo "Plan run ended with status: ${status}" >&2
                exit 1
                ;;
            esac
          done
          echo "Timed out waiting for plan to complete" >&2
          exit 1

      - name: Open drift issue
        if: steps.poll.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKSPACE: ${{ matrix.workspace }}
        run: |
          TITLE="[Drift] Infrastructure drift detected in workspace: ${WORKSPACE}"
          BODY="## Infrastructure Drift Detected

          Workspace **\`${WORKSPACE}\`** has drifted from the Terraform state.

          | Metric | Count |
          |--------|-------|
          | Additions | ${{ steps.poll.outputs.resource_additions }} |
          | Changes | ${{ steps.poll.outputs.resource_changes }} |
          | Destructions | ${{ steps.poll.outputs.resource_destructions }} |

          **Plan URL:** ${{ steps.poll.outputs.run_url }}

          Review and apply the changes to bring the workspace back into compliance.
          "

          # Check if an open drift issue already exists to avoid duplicates
          existing=$(gh issue list \
            --label "drift" \
            --state open \
            --search "\"[Drift]\" in:title workspace: ${WORKSPACE}" \
            --json number \
            --jq '.[0].number')

          if [ -z "$existing" ]; then
            gh issue create \
              --title "$TITLE" \
              --body "$BODY" \
              --label "drift"
          else
            echo "Drift issue #${existing} already open for ${WORKSPACE}, skipping creation."
          fi

  summary:
    name: Drift Detection Summary
    runs-on: ubuntu-latest
    needs: detect-drift
    if: always()
    steps:
      - name: Publish summary
        run: |
          echo "## Drift Detection Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workspace | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| organization | ${{ needs.detect-drift.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| apps | ${{ needs.detect-drift.result }} |" >> "$GITHUB_STEP_SUMMARY"
