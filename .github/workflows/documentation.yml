name: Generate Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**/*.tf'
      - 'modules/**/README.md'
      - '.terraform-docs.yml'
      - 'scripts/module-docs.sh'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

permissions:
  contents: write   # Required: create-pull-request pushes a commit to a branch
  pull-requests: write

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Generate Module Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate module documentation
        run: make docs

      - name: Create Pull Request for docs update
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-generate module documentation"
          branch: "auto/docs-update"
          delete-branch: true
          title: "chore: auto-generated documentation update"
          body: |
            Automated documentation update generated by terraform-docs.

            This PR was created automatically by the documentation workflow.
          labels: "documentation,automated"
