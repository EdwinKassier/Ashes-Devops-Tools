name: Generate Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**/*.tf'
      - 'modules/**/README.md'
      - '.terraform-docs.yml'
      - 'scripts/module-docs.sh'
      - '.github/workflows/documentation.yml'
  workflow_dispatch:

permissions:
  contents: write   # Required: create-pull-request pushes a commit to a branch
  pull-requests: write

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Generate Module Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Use DOCS_BOT_PAT (a dedicated machine-account PAT with repo scope) rather
          # than GITHUB_TOKEN. GitHub does NOT trigger downstream workflow runs (e.g.
          # terraform-plan.yml) on PRs opened by GITHUB_TOKEN, so auto-generated docs
          # PRs would bypass all validation. A machine-account PAT opens the PR as that
          # account and triggers workflows normally.
          #
          # Setup: create a machine account (e.g. "ashes-docs-bot"), store its PAT as
          # DOCS_BOT_PAT in repository secrets with "repo" scope.
          # Fall back to GITHUB_TOKEN only when the PAT secret is absent (forks / first-time setup).
          token: ${{ secrets.DOCS_BOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Generate module documentation
        run: make docs

      - name: Create Pull Request for docs update
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.DOCS_BOT_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-generate module documentation"
          branch: "auto/docs-update"
          delete-branch: true
          title: "chore: auto-generated documentation update"
          body: |
            Automated documentation update generated by terraform-docs.

            This PR was created automatically by the documentation workflow.

            ⚠️ If CI checks are not running on this PR, configure the `DOCS_BOT_PAT`
            secret (see `.github/workflows/documentation.yml` for instructions).
          labels: "documentation,automated"
          # Require review to prevent auto-merge of unvalidated documentation changes.
          # Set DOCS_REVIEWER to a GitHub username or use team-reviewers for team-based review.
          # Falls back to a repository variable (DOCS_REVIEWER) if set, otherwise empty
          # (no reviewer required). Override with team-reviewers: "infra-reviewers" if preferred.
          reviewers: ${{ vars.DOCS_REVIEWER }}
