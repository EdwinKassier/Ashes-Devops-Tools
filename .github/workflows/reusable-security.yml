name: Reusable Security Scan

on:
  workflow_call:
    inputs:
      sarif_output:
        description: "Whether to generate and upload SARIF results to GitHub Security"
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  tfsec:
    name: TFSec
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run TFSec on modules
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6  # v1.0.3
        with:
          working_directory: modules
          soft_fail: false
          # Use absolute path: tfsec resolves config_file relative to working_directory,
          # so a bare ".tfsec.yml" would look for modules/.tfsec.yml (which doesn't exist)
          # and silently skip all exclusion rules. GITHUB_WORKSPACE always points to the
          # repo root regardless of working_directory.
          config_file: ${{ github.workspace }}/.tfsec.yml
          format: ${{ inputs.sarif_output && 'sarif' || 'default' }}
          additional_args: ${{ inputs.sarif_output && '--out tfsec-results.sarif' || '' }}

      - name: Run TFSec on envs
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6  # v1.0.3
        with:
          working_directory: envs
          soft_fail: false
          config_file: ${{ github.workspace }}/.tfsec.yml
          format: ${{ inputs.sarif_output && 'sarif' || 'default' }}
          additional_args: ${{ inputs.sarif_output && '--out tfsec-env-results.sarif' || '' }}

      - name: Upload TFSec modules SARIF
        if: inputs.sarif_output && always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

      - name: Upload TFSec envs SARIF
        if: inputs.sarif_output && always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          sarif_file: tfsec-env-results.sarif
          category: tfsec-envs

      - name: Generate TFSec JSON report
        if: inputs.sarif_output && always()
        # Pin the Docker image to the same version as .tool-versions (v1.28.6) to
        # prevent supply-chain drift. The tfsec-action above is SHA-pinned; this
        # Docker invocation must match.
        run: |
          docker run --rm -v "$(pwd):/src" aquasec/tfsec:v1.28.6 /src/modules \
            --config-file /src/.tfsec.yml --format json > tfsec-report.json

      - name: Upload TFSec report artifact
        if: inputs.sarif_output && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: tfsec-report
          path: tfsec-report.json

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Checkov on modules
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12
        with:
          directory: modules
          framework: terraform
          quiet: true
          soft_fail: false
          # Resolve remote modules (e.g. terraform-google-modules/project-factory/google
          # used by modules/stages/workload) so their contents are actually scanned
          # instead of silently skipped with a "module not found" warning.
          download_external_modules: true
          config_file: .checkov.yaml
          output_format: ${{ inputs.sarif_output && 'sarif,cli' || 'cli' }}
          output_file_path: ${{ inputs.sarif_output && 'checkov-results.sarif,checkov-report.txt' || 'console' }}

      - name: Run Checkov on envs
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12
        with:
          directory: envs
          framework: terraform
          quiet: true
          soft_fail: false
          # See rationale on the modules invocation above.
          download_external_modules: true
          config_file: .checkov.yaml
          output_format: ${{ inputs.sarif_output && 'sarif,cli' || 'cli' }}
          output_file_path: >-
            ${{ inputs.sarif_output && 'checkov-env-results.sarif,checkov-env-report.txt' || 'console' }}

      - name: Upload Checkov modules SARIF
        if: inputs.sarif_output && always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Upload Checkov envs SARIF
        if: inputs.sarif_output && always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v4.35.4
        with:
          sarif_file: checkov-env-results.sarif
          category: checkov-envs

      - name: Upload Checkov report artifact
        if: inputs.sarif_output && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: checkov-report
          path: |
            checkov-report.txt
            checkov-env-report.txt
