name: Terraform Release Metadata

on:
  push:
    tags:
      - "organization/v*"
      - "apps/*/v*"

permissions:
  contents: write

jobs:
  verify-run:
    name: Verify Terraform Cloud Run
    runs-on: ubuntu-latest
    outputs:
      workspace: ${{ steps.parse.outputs.workspace }}
      release_name: ${{ steps.parse.outputs.release_name }}
      version: ${{ steps.parse.outputs.version }}
      status: ${{ steps.run_status.outputs.status }}
    steps:
      - name: Parse tag
        id: parse
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$TAG_NAME" == organization/* ]]; then
            VERSION="${TAG_NAME##*/}"
            echo "workspace=organization" >> "$GITHUB_OUTPUT"
            echo "release_name=Organization ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            ENVIRONMENT=$(echo "$TAG_NAME" | cut -d'/' -f2)
            VERSION=$(echo "$TAG_NAME" | cut -d'/' -f3)
            echo "workspace=apps-${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
            echo "release_name=Apps ${ENVIRONMENT} ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Assert Terraform Cloud credentials are configured
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
        run: |
          test -n "$TFC_TOKEN"
          test -n "$TFC_ORGANIZATION"

      - name: Fetch latest Terraform Cloud run
        id: run_status
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          WORKSPACE: ${{ steps.parse.outputs.workspace }}
        run: |
          response=$(curl --silent --show-error \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${TFC_ORGANIZATION}/workspaces/${WORKSPACE}/runs?page%5Bsize%5D=1")
          status=$(echo "$response" | jq -r '.data[0].attributes.status')
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          case "$status" in
            applied|planned_and_finished)
              ;;
            *)
              echo "Latest Terraform Cloud run for ${WORKSPACE} is ${status}" >&2
              exit 1
              ;;
          esac

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: verify-run
    steps:
      - name: Create release summary
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace: ${{ needs.verify-run.outputs.workspace }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ needs.verify-run.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Terraform Cloud status: ${{ needs.verify-run.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.verify-run.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Terraform Cloud workspace `${{ needs.verify-run.outputs.workspace }}` has a successful run with status `${{ needs.verify-run.outputs.status }}`.
