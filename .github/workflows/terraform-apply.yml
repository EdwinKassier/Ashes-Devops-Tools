name: Terraform Release Metadata

on:
  push:
    tags:
      - "organization/v*"
      - "apps/*/v*"

permissions: {}

concurrency:
  group: terraform-apply-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-run:
    name: Verify Terraform Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      workspace: ${{ steps.parse.outputs.workspace }}
      release_name: ${{ steps.parse.outputs.release_name }}
      version: ${{ steps.parse.outputs.version }}
      status: ${{ steps.run_status.outputs.status }}
    steps:
      - name: Parse tag
        id: parse
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$TAG_NAME" == organization/* ]]; then
            VERSION="${TAG_NAME##*/}"
            echo "workspace=organization" >> "$GITHUB_OUTPUT"
            echo "release_name=Organization ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            ENVIRONMENT=$(echo "$TAG_NAME" | cut -d'/' -f2)
            VERSION=$(echo "$TAG_NAME" | cut -d'/' -f3)
            echo "workspace=apps-${ENVIRONMENT}" >> "$GITHUB_OUTPUT"
            echo "release_name=Apps ${ENVIRONMENT} ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Assert Terraform Cloud credentials are configured
        # TFC_TOKEN must be a Terraform Cloud team token scoped to READ access
        # on workspace runs only. It is used solely to verify run status before
        # publishing a GitHub release — it does not trigger or modify any run.
        # Create a dedicated team in TFC with "Read runs" permission and store
        # its token as the TFC_TOKEN secret (not an org-level or user token).
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
        run: |
          test -n "$TFC_TOKEN"
          test -n "$TFC_ORGANIZATION"

      - name: Fetch latest Terraform Cloud run
        id: run_status
        env:
          TFC_TOKEN: ${{ secrets.TFC_TOKEN }}
          TFC_ORGANIZATION: ${{ vars.TFC_ORGANIZATION }}
          WORKSPACE: ${{ steps.parse.outputs.workspace }}
        run: |
          response=$(curl --silent --show-error --fail-with-body \
            --max-time 30 --connect-timeout 10 \
            --header "Authorization: Bearer ${TFC_TOKEN}" \
            --header "Content-Type: application/vnd.api+json" \
            "https://app.terraform.io/api/v2/organizations/${TFC_ORGANIZATION}/workspaces/${WORKSPACE}/runs?page%5Bsize%5D=1") \
            || { echo "TFC API request failed — check TFC_TOKEN and TFC_ORGANIZATION secrets" >&2; exit 1; }

          # Validate that the response is valid JSON with a data array
          if ! echo "$response" | jq -e '.data | type == "array"' >/dev/null 2>&1; then
            echo "Unexpected TFC API response format: $response" >&2
            exit 1
          fi

          run_count=$(echo "$response" | jq '.data | length')
          if [ "$run_count" -eq 0 ]; then
            echo "No runs found for workspace ${WORKSPACE} — tag a release only after a run exists" >&2
            exit 1
          fi

          status=$(echo "$response" | jq -r '.data[0].attributes.status')
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          case "$status" in
            applied|planned_and_finished)
              # Run completed successfully
              ;;
            apply_queued)
              # Run is pending manual apply approval in TFC — release tag is valid
              ;;
            *)
              echo "Latest Terraform Cloud run for ${WORKSPACE} is '${status}' — expected applied, planned_and_finished, or apply_queued" >&2
              exit 1
              ;;
          esac

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify-run
    permissions:
      contents: write
    steps:
      - name: Create release summary
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Workspace: ${{ needs.verify-run.outputs.workspace }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ needs.verify-run.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Terraform Cloud status: ${{ needs.verify-run.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          name: ${{ needs.verify-run.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Terraform Cloud workspace `${{ needs.verify-run.outputs.workspace }}` has a successful run with status `${{ needs.verify-run.outputs.status }}`.
