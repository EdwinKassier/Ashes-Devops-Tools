# markdownlint configuration.
#
# Most READMEs in this repo are partially or fully generated by terraform-docs
# (see the <!-- BEGIN_TF_DOCS --> / <!-- END_TF_DOCS --> markers and `make docs`).
# terraform-docs output legitimately uses patterns that markdownlint's default
# rule set flags as style violations. Disabling these rules avoids either
# fighting the generator or hand-editing generated content, per this repo's
# "generated docs are the source of truth" convention.
default: true

# Long lines are expected in terraform-docs generated tables (Inputs/Outputs/
# Requirements) and in hand-written docs with URLs or code samples.
MD013: false

# terraform-docs emits <a name="..."></a> anchors and <br> line breaks inside
# generated tables (Requirements/Providers/Inputs/Outputs sections).
MD033: false

# Per-module READMEs can have a hand-written section (e.g. "## Usage",
# "## Outputs") ahead of the generated TF_DOCS block, which emits its own
# heading of the same name — an intentional structural pattern, not a typo.
MD024: false

# Table pipe alignment/spacing style as emitted by terraform-docs' markdown
# table formatter does not match markdownlint's default "compact"/"aligned"
# table style, and reformatting would fight the generator on every `make docs`.
MD060: false

# terraform-docs faithfully renders variable/output descriptions verbatim,
# including regex literals like `^[A-Z][A-Z0-9_]*$` in validation docs
# (see modules/supabase/vault-secrets/variables.tf). markdownlint's
# reference-link parser misreads bracket-pairs in such regexes as an
# undefined link reference. False positive, not a doc quality issue.
MD052: false

# README.md deliberately opens with a centered `<div align="center">` badge
# banner (logo + title + tagline) before the first heading, and uses bold
# text as a tagline under the H1 rather than a second heading — a common,
# intentional GitHub README convention.
MD041: false
MD036: false

# .terraform-docs.yml's `content:` template uses literal tab characters and
# blank-line spacing (in the fill-in-the-value "Usage" code block and around
# conditional `{{ if ... }}` sections) that terraform-docs reproduces verbatim
# in every generated README. These are generator output, not hand-authored
# formatting choices — disabled for the same reason as MD060/trailing-spaces
# above rather than fighting `make docs` on every run.
MD010: false
MD012: false

# Pre-existing hand-written README prose in this repo does not consistently
# blank-line-pad headings/lists/tables/fences, and several docs reference bare
# URLs (Slack webhooks, GCP docs, IAM email formats) inline rather than as
# markdown links. These are whitespace/style conventions the repo has never
# enforced, not correctness issues, and fixing them safely requires touching
# ~15 files that also contain generator-owned `<!-- BEGIN_TF_DOCS -->` blocks
# (auto-`--fix` mutates generated content — see MD010/MD012 above). Disabled
# rather than risk regenerating drift between hand-fixed prose and `make docs`.
MD009: false
MD022: false
MD031: false
MD032: false
MD034: false
MD058: false
